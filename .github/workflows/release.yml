name: Release

# Triggered by pushing a version tag: git tag v1.2.3 && git push --tags
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # needed to create GitHub releases

jobs:
  # ─── Step 1: Tests must pass before we build binaries ───────────────────────
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  # ─── Step 2: Build macOS binaries (must run on macOS for notarization) ──────
  build-macos-arm64:
    name: Build macOS arm64 binary
    runs-on: macos-14  # Apple Silicon
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Build arm64 binary
        run: |
          mkdir -p dist/binaries
          bun build src/index.ts \
            --compile \
            --target bun-darwin-arm64 \
            --outfile dist/binaries/rulegen-macos-arm64 \
            --minify
      - uses: actions/upload-artifact@v4
        with:
          name: rulegen-macos-arm64
          path: dist/binaries/rulegen-macos-arm64
          retention-days: 1

  build-macos-x64:
    name: Build macOS x64 binary
    runs-on: macos-13  # Intel
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Build x64 binary
        run: |
          mkdir -p dist/binaries
          bun build src/index.ts \
            --compile \
            --target bun-darwin-x64 \
            --outfile dist/binaries/rulegen-macos-x64 \
            --minify
      - uses: actions/upload-artifact@v4
        with:
          name: rulegen-macos-x64
          path: dist/binaries/rulegen-macos-x64
          retention-days: 1

  # ─── Step 3: Build Linux + Windows binaries (cross-compile on Linux) ────────
  build-other-platforms:
    name: Build Linux + Windows binaries
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Build all non-macOS binaries
        run: |
          mkdir -p dist/binaries
          for target_name in \
            "bun-linux-x64:rulegen-linux-x64" \
            "bun-linux-arm64:rulegen-linux-arm64" \
            "bun-windows-x64:rulegen-windows-x64.exe"; do
            target="${target_name%%:*}"
            name="${target_name##*:}"
            echo "Building $name..."
            bun build src/index.ts \
              --compile \
              --target "$target" \
              --outfile "dist/binaries/$name" \
              --minify
          done
      - uses: actions/upload-artifact@v4
        with:
          name: rulegen-other-platforms
          path: dist/binaries/
          retention-days: 1

  # ─── Step 4: Bundle, publish npm, create GitHub release ─────────────────────
  release:
    name: Create Release
    runs-on: macos-14
    needs: [build-macos-arm64, build-macos-x64, build-other-platforms]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build

      # Download all binaries
      - uses: actions/download-artifact@v4
        with:
          name: rulegen-macos-arm64
          path: dist/binaries/

      - uses: actions/download-artifact@v4
        with:
          name: rulegen-macos-x64
          path: dist/binaries/

      - uses: actions/download-artifact@v4
        with:
          name: rulegen-other-platforms
          path: dist/binaries/

      - name: Make binaries executable
        run: chmod +x dist/binaries/rulegen-macos-arm64 dist/binaries/rulegen-macos-x64 dist/binaries/rulegen-linux-x64 dist/binaries/rulegen-linux-arm64

      # Create SPM artifact bundle
      - name: Create artifact bundle
        run: ./scripts/bundle-artifactbundle.sh

      - name: Read checksum
        id: checksum
        run: echo "sha256=$(cat dist/rulegen-macos.artifactbundle.zip.sha256)" >> $GITHUB_OUTPUT

      # Update Package.swift checksum in the swift platform plugin
      - name: Update SPM Package.swift checksum
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i '' \
            "s|url: \".*rulegen-macos.artifactbundle.zip\"|url: \"https://github.com/sutheesh/rulegen/releases/download/${GITHUB_REF_NAME}/rulegen-macos.artifactbundle.zip\"|" \
            platforms/swift/Package.swift
          sed -i '' \
            "s|checksum: \".*\"|checksum: \"${{ steps.checksum.outputs.sha256 }}\"|" \
            platforms/swift/Package.swift

      # Publish to npm
      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Create GitHub release with all artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: RuleGen ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/binaries/rulegen-macos-arm64
            dist/binaries/rulegen-macos-x64
            dist/binaries/rulegen-linux-x64
            dist/binaries/rulegen-linux-arm64
            dist/binaries/rulegen-windows-x64.exe
            dist/rulegen-macos.artifactbundle.zip
            dist/rulegen-macos.artifactbundle.zip.sha256
          body: |
            ## Install

            ```bash
            npm install -D rulegen    # JS/TS projects
            brew install sutheesh/tap/rulegen  # Any project
            ```

            **Swift (SPM)** — update your `Package.swift` binaryTarget checksum to:
            ```
            ${{ steps.checksum.outputs.sha256 }}
            ```

            See [README](https://github.com/sutheesh/rulegen#readme) for full install instructions.
